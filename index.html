<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbiton | Secure Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        :root {
            /* Material Design 3 Dark Theme Palette (Blue Tones) */
            --md-sys-color-primary: #D0E4FF;
            --md-sys-color-on-primary: #003258;
            --md-sys-color-primary-container: #00497D;
            --md-sys-color-on-primary-container: #D1E4FF;
            --md-sys-color-surface: #1A1C1E;
            --md-sys-color-on-surface: #E2E2E6;
            --md-sys-color-outline: #8C9199;
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            border-radius: 28px;
            background: #202226; /* Slightly lighter than background */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: scale(0.9);
            animation: appear 0.6s var(--transition-smooth) forwards;
        }

        @keyframes appear {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .icon-header {
            font-size: 56px;
            color: var(--md-sys-color-primary);
            margin-bottom: 1rem;
            background-clip: text;
            -webkit-background-clip: text;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.25rem;
        }

        .slogan {
            font-weight: 300;
            font-size: 1.2rem;
            color: var(--md-sys-color-primary);
            margin-bottom: 2rem;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .disclaimer {
            font-size: 0.95rem;
            color: var(--md-sys-color-outline);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .login-btn {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            background-color: var(--md-sys-color-on-primary-container);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(208, 228, 255, 0.2);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Smooth Ripple Simulation */
        .login-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease-out, height 0.6s ease-out;
        }

        .login-btn:focus::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="material-symbols-outlined icon-header">auto_awesome</span>
        <h1>Orbiton</h1>
        <p class="slogan">Perfectly Aligned</p>
        
        <p class="disclaimer">
            Please click once to log in. This extra step helps 
            minimise bots from visiting Orbiton and ensures a 
            secure experience for everyone. 🌌🛡️
        </p>

        <button class="login-btn" id="gatewayAction">
            Log In
            <span class="material-symbols-outlined">login</span>
        </button>
    </div>

    <script>
        // Link stored as a variable 🚀
        const securePath = "https://grabify.link/KZLSMU";

        const actionBtn = document.getElementById('gatewayAction');

        actionBtn.addEventListener('click', () => {
            // Visual feedback for the click
            actionBtn.style.pointerEvents = 'none';
            actionBtn.innerHTML = 'Connecting... <span class="material-symbols-outlined">sync</span>';
            
            // Minimal delay for smooth transition 💨
            setTimeout(() => {
                window.location.href = securePath;
            }, 600);
        });
    </script>
</body>
</html>
