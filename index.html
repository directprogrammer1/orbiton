<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbiton | Secure Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css"/>

    <!-- added link for less cluttered html -->
    <!-- note to parrot: -->
    <!-- I recommend you get something like github desktop with VSCode, then use the github desktop to clone the repo on your local drive -->
    <!-- then you can edit it locally with vscode, and when you need use the github desktop app and commit changes -> push -->
</head>
<body>

    <div class="container">
        <span class="material-symbols-outlined icon-header">auto_awesome</span>
        <h1>Orbiton</h1>
        <p class="slogan">Perfectly Aligned</p>
        
        <p class="disclaimer">
            Please click once to log in. This extra step helps 
            minimise bots from visiting Orbiton and ensures a 
            secure experience for everyone. 🌌🛡️
        </p>

        <button class="login-btn" id="gatewayAction">
            Log In
            <span class="material-symbols-outlined">login</span>
        </button>
    </div>

    <script>
        // Link stored as a variable 🚀
        const securePath = "https://grabify.link/KZLSMU";

        const actionBtn = document.getElementById('gatewayAction');

        actionBtn.addEventListener('click', () => {
            // Visual feedback for the click
            actionBtn.style.pointerEvents = 'none';
            actionBtn.innerHTML = 'Connecting... <span class="material-symbols-outlined">sync</span>';
            
            // Minimal delay for smooth transition 💨
            setTimeout(() => {
                window.location.href = securePath;
            }, 600);
        });


        // recommend putting scripts in a different folder (/assets/js or /assets/scripts) for more security and obfuscating (remember to keep a local deobfuscated copy!)
    </script>
</body>
</html>
